name: Build Linux AppImage

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Install dependencies
        run: |
            sudo apt update
            sudo apt-get install build-essential git make \
            pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
            libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
            libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
            libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev
      
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build Executable
        run: |
          mkdir -p build
          cd build
          cmake ..
          make
      
      - name: Create AppImage framework 
        run: |
          cmake --install build --prefix AppDir/usr/bin
          mkdir -p AppDir/scripts
          mkdir -p AppDir/usr/bin/scripts
          mkdir -p AppDir/usr/share/doc/spencer-macro-utilities
          mkdir -p AppDir/usr/share/spencer-macro-utilities/scripts
          cp scripts/install_linux_permissions.sh AppDir/scripts/install_linux_permissions.sh
          cp scripts/install_linux_permissions.sh AppDir/usr/bin/scripts/install_linux_permissions.sh
          cp scripts/install_linux_permissions.sh AppDir/usr/share/spencer-macro-utilities/scripts/install_linux_permissions.sh
          chmod 755 \
            AppDir/scripts/install_linux_permissions.sh \
            AppDir/usr/bin/scripts/install_linux_permissions.sh \
            AppDir/usr/share/spencer-macro-utilities/scripts/install_linux_permissions.sh
          cp LINUX_SETUP.md AppDir/LINUX_SETUP.md
          cp LINUX_SETUP.md AppDir/usr/share/doc/spencer-macro-utilities/LINUX_SETUP.md
          cp LINUX_SETUP.md AppDir/usr/share/spencer-macro-utilities/LINUX_SETUP.md
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps

          cp AppImage/AppRun AppDir/
          cp AppImage/SMU.desktop AppDir/
          cp AppImage/SMU.png AppDir/
          
          cp AppImage/SMU.desktop AppDir/usr/share/applications/
          cp AppImage/SMU.png AppDir/usr/share/icons/hicolor/32x32/apps/

          chmod +x AppDir/AppRun
      - name: Download appimagetool
        env:
            GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE=$(gh api https://api.github.com/repos/AppImage/appimagetool/releases/latest)
          URL=$(echo $RELEASE | jq -r '.assets[] | select(.name == "appimagetool-x86_64.AppImage") | .browser_download_url')
          wget -O appimagetool.AppImage $URL
          chmod +x appimagetool.AppImage
      
      - name: Build AppImage
        run: |
          ./appimagetool.AppImage AppDir
          rm appimagetool.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: suspend-appimage
          path: "*.AppImage"
