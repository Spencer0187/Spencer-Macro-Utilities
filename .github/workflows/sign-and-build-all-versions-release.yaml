name: Sign and Build Release

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxinerama-dev libxkbcommon-dev

      - name: Configure Linux build
        run: cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=Release

      - name: Build Linux app and package folder
        run: |
          cmake --build build/linux --target suspend
          cmake --build build/linux --target package-linux-dir

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: SpencerMacroUtilities-linux
          path: build/linux/SpencerMacroUtilities
  sign:
    needs: build-linux
    runs-on: windows-latest
    
    permissions:
      contents: read

    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY: ${{ secrets.SIGNPATH_SIGNING_POLICY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Windows build
        run: cmake -S . -B build/windows -G "Visual Studio 17 2022" -A x64

      - name: Build Windows app
        run: cmake --build build/windows --config Release --target suspend

      - name: Upload unsigned ZIP for signing
        id: upload-artifact-step
        uses: actions/upload-artifact@v4
        with:
          path: build/windows/Release/suspend.exe

      - name: Submit signing request to SignPath and upload to signed
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: ${{ steps.upload-artifact-step.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          artifact-configuration-slug: initial
          output-artifact-directory: signed/

      - name: Prepare zip staging folder
        run: |
          mkdir staging
          copy "signed\suspend.exe" staging\
          copy "README.md" staging\
        shell: pwsh
      
      - name: Create zip (store mode, flat structure)
        run: 7z a -mx=0 Spencer-Macro-Utilities.zip suspend.exe README.md
        working-directory: staging
      
      - name: Move zip to signed/ (overwrite)
        run: Move-Item staging\Spencer-Macro-Utilities.zip signed\ -Force
        shell: pwsh

      - name: Upload signed zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spencer-Macro-Utilities-signed
          path: signed/Spencer-Macro-Utilities.zip

      - name: Clean up staging folder
        run: Remove-Item -Recurse -Force staging
        shell: pwsh

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read

    env:
      SMU_MACOS_RELEASE_CERTIFICATE_BASE64: ${{ secrets.SMU_MACOS_RELEASE_CERTIFICATE_BASE64 }}
      SMU_MACOS_RELEASE_CERTIFICATE_PASSWORD: ${{ secrets.SMU_MACOS_RELEASE_CERTIFICATE_PASSWORD }}
      SMU_MACOS_RELEASE_SIGN_IDENTITY: ${{ secrets.SMU_MACOS_RELEASE_SIGN_IDENTITY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check stable macOS release certificate secrets
        shell: bash
        run: |
          if [[ -z "$SMU_MACOS_RELEASE_CERTIFICATE_BASE64" ||
                -z "$SMU_MACOS_RELEASE_CERTIFICATE_PASSWORD" ]]; then
            echo "Stable macOS release certificate secrets are required for release artifacts." >&2
            echo "Create them with scripts/create_macos_release_certificate.sh." >&2
            exit 1
          fi

      - name: Import stable self-signed macOS release certificate
        shell: bash
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          KEYCHAIN_PATH="$RUNNER_TEMP/smu-macos-release.keychain-db"
          CERT_PATH="$RUNNER_TEMP/smu-macos-release.p12"
          CERT_PEM="$RUNNER_TEMP/smu-macos-release.cert.pem"
          echo "$SMU_MACOS_RELEASE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          openssl pkcs12 \
            -in "$CERT_PATH" \
            -nokeys \
            -passin "pass:$SMU_MACOS_RELEASE_CERTIFICATE_PASSWORD" \
            -out "$CERT_PEM"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$SMU_MACOS_RELEASE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security add-trusted-cert -r trustRoot -p codeSign -k "$KEYCHAIN_PATH" "$CERT_PEM"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          echo "SMU_MACOS_SIGN_IDENTITY=${SMU_MACOS_RELEASE_SIGN_IDENTITY:-SMU macOS Release}" >> "$GITHUB_ENV"

      - name: Build self-signed universal macOS package
        run: bash scripts/package_macos.sh

      - name: Upload self-signed macOS package
        uses: actions/upload-artifact@v4
        with:
          name: SpencerMacroUtilities-macOS-universal-self-signed
          path: |
            out/build/macos-universal-release/package-macos/SpencerMacroUtilities-macOS-universal.zip
            out/build/macos-universal-release/package-macos/SpencerMacroUtilities-macOS-universal.dmg
