name: Sign Release and Build Linux Binary

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes
        id: check_diff
        run: |
          # check if there are any changes in the helper since the last commit
          if git diff --quiet HEAD^ HEAD -- "visual studio/Resource Files/Suspend_Input_Helper_Source/linux_helper.cpp"; then
            echo "no_change=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_change=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build linux binary
        if: steps.check_diff.outputs.no_change == 'false'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          g++ -o ./visual\ studio/Resource\ Files/Suspend_Input_Helper_Linux_Binary ./visual\ studio/Resource\ Files/Suspend_Input_Helper_Source/linux_helper.cpp -O3 -std=c++11

      - name: Upload linux binary
        if: steps.check_diff.outputs.no_change == 'false'
        uses: actions/upload-artifact@v4
        with:
          path: visual\ studio/Resource\ Files/Suspend_Input_Helper_Linux_Binary
          name: Suspend_Input_Helper_Linux_Binary
  sign:
    needs: build-linux # Ensure linux build completes first
    runs-on: windows-latest
    
    permissions:
      contents: read

    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY: ${{ secrets.SIGNPATH_SIGNING_POLICY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Build project
        run: msbuild "visual studio\suspend.sln" /p:Configuration=Release /p:Platform=x64 `
          /p:WholeProgramOptimization=false `
          /p:Optimization=FullOptimization `
          /p:IntrinsicFunctions=true `
          /p:FramePointerOmission=true `
          /p:FiberSafeOptimizations=true `
          /p:RuntimeLibrary=MultiThreaded `
          /p:OptimizeReferences=true `
          /p:EnableCOMDATFolding=true

      - name: Upload unsigned ZIP for signing
        id: upload-artifact-step
        uses: actions/upload-artifact@v4
        with:
          path: visual studio\x64\Release\suspend.exe

      - name: Submit signing request to SignPath and upload to signed
        uses: signpath/github-action-submit-signing-request@v1.1
        with:
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY }}
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          github-artifact-id: ${{ steps.upload-artifact-step.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          artifact-configuration-slug: initial
          output-artifact-directory: signed/

      - name: Prepare zip staging folder
        run: |
          mkdir staging
          copy "signed\suspend.exe" staging\
          copy "README.md" staging\
        shell: pwsh
      
      - name: Create zip (store mode, flat structure)
        run: 7z a -mx=0 Spencer-Macro-Utilities.zip suspend.exe README.md
        working-directory: staging
      
      - name: Move zip to signed/ (overwrite)
        run: Move-Item staging\Spencer-Macro-Utilities.zip signed\ -Force
        shell: pwsh

      - name: Upload signed zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spencer-Macro-Utilities-signed
          path: signed/Spencer-Macro-Utilities.zip

      - name: Clean up staging folder
        run: Remove-Item -Recurse -Force staging
        shell: pwsh
