name: spencer-macro-utilities
arch: amd64
platform: linux
version: 3.2.1
section: default
priority: optional
maintainer: FloofyIV <floofyiv9@proton.me>
description: |
  An open source C++ Roblox Macro with many features.
vendor: FloofyIV
homepage: https://spencermacro.vercel.app
contents:
  - src: ./staged/usr/bin/suspend
    dst: /usr/share/spencer-macro-utilities/suspend
    file_info:
      mode: 0755
  - src: ./staged/usr/bin/nethelper
    dst: /usr/share/spencer-macro-utilities/nethelper
    file_info:
      mode: 0755
  - src: ./staged/usr/bin/assets/*
    dst: /usr/share/spencer-macro-utilities/assets/
  - src: ./staged/usr/bin/assets/macro_tutorials/*
    dst: /usr/share/spencer-macro-utilities/assets/macro_tutorials/
  - src: ./AppImage/launcher.sh
    dst: /usr/bin/spencer-macro-utilities
    file_info:
      mode: 0755
  - src: ./staged/usr/lib/
    dst: /usr/lib/
  - src: ./staged/usr/share/spencer-macro-utilities/scripts/install_linux_permissions.sh
    dst: /usr/share/spencer-macro-utilities/scripts/install_linux_permissions.sh
    file_info:
      mode: 0755
  - src: ./staged/usr/share/doc/spencer-macro-utilities/LINUX_SETUP.md
    dst: /usr/share/doc/spencer-macro-utilities/LINUX_SETUP.md
  - src: ./AppImage/spencer-macro-utilities.desktop
    dst: /usr/share/applications/spencer-macro-utilities.desktop
  - src: ./AppImage/SMU.png
    dst: /usr/share/pixmaps/spencer-macro-utilities.png
scripts:
  postinstall: ./AppImage/postinstall.sh
  postremove: ./AppImage/postremove.sh
